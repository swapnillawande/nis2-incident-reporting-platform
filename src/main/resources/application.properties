spring.application.name=NISync

server.port=${BACKEND_PORT:8080}
server.servlet.context-path=/api/v1

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:nis2_platform}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

springdoc.swagger-ui.path=/swagger-ui.html

logging.level.root=INFO
logging.level.com.nisync=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %level - %logger{36} - %msg%n

jwt.secret=${JWT_SECRET:nisync-local-development-secret-key-for-jwt-token-signing-2026}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}


management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
