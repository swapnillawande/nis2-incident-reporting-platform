services:

  postgres:
    image: postgres:16
    container_name: nis2-postgres
    restart: always
    environment:
      POSTGRES_DB: nis2_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nis2-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10


  backend:
    build:
      context: ..
    container_name: nis2-backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nis2-network
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nis2_platform
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update


  frontend:
    build:
      context: ../frontend
    container_name: nis2-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - nis2-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - nis2-network
  
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - nis2-network
  
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped

    depends_on:
      - kafka

    ports:
      - "8085:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: nis2-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

    networks:
      - nis2-network


  seeder-users:
    build:
      context: ../infra/scripts
    container_name: nis2-seeder-users
    depends_on:
      backend:
        condition: service_started
    networks:
      - nis2-network
    restart: "no"
    command: ["sh", "-c", "sleep 20 && python sql-users.py"]
    environment:
      DB_HOST: postgres
      DB_NAME: nis2_platform
      DB_USER: postgres
      DB_PASSWORD: postgres
      DELETE_DATA: "false"
      SEED_DATA: "false"


  seeder-incidents:
    build:
      context: ../infra/scripts
    container_name: nis2-seeder-incidents
    depends_on:
      seeder-users:
        condition: service_completed_successfully
    networks:
      - nis2-network
    restart: "no"
    command: ["sh", "-c", "sleep 10 && python sql-incidents.py"]
    environment:
      DB_HOST: postgres
      DB_NAME: nis2_platform
      DB_USER: postgres
      DB_PASSWORD: postgres
      DELETE_DATA: "false"
      SEED_DATA: "false"

volumes:
  postgres_data:

networks:
  nis2-network:
    driver: bridge