services:

  postgres:
    image: postgres:16
    container_name: nis2-postgres
    restart: always
    environment:
      POSTGRES_DB: nis2_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nis2-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10


  backend:
    image: infra-backend:latest
    container_name: nis2-backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nis2-network
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nis2_platform
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update


  frontend:
    image: infra-frontend:latest
    container_name: nis2-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - nis2-network


  seeder-users:
    image: infra-seeder-users:latest
    container_name: nis2-seeder-users
    depends_on:
      backend:
        condition: service_started
    networks:
      - nis2-network
    restart: "no"
    command: ["sh", "-c", "sleep 20 && python sql-users.py"]
    environment:
      DB_HOST: postgres
      DB_NAME: nis2_platform
      DB_USER: postgres
      DB_PASSWORD: postgres
      DELETE_DATA: "false"
      SEED_DATA: "false"


  seeder-incidents:
    image: infra-seeder-incidents:latest
    container_name: nis2-seeder-incidents
    depends_on:
      seeder-users:
        condition: service_completed_successfully
    networks:
      - nis2-network
    restart: "no"
    command: ["sh", "-c", "sleep 10 && python sql-incidents.py"]
    environment:
      DB_HOST: postgres
      DB_NAME: nis2_platform
      DB_USER: postgres
      DB_PASSWORD: postgres
      DELETE_DATA: "false"
      SEED_DATA: "false"

volumes:
  postgres_data:

networks:
  nis2-network:
    driver: bridge